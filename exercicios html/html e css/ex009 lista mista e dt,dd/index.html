<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas mistas</title>
</head>
<body>
    <h1>Podemos criar listas mistas ou sublista</h1>
    <ol>
        <li>Novas Linguagens</li>
        <ul type="cicle">
            <li>PhP</li>
            <li>JavaScript</li>
            <li>phyton</li>
            <li>SQL</li>
        </ul>
    </ol>

    <h2>Lista de definição</h2>
    <p>A tag dl é a lista de definição, dentro dela colocamos a tag dt para termo e dd para descrição, exemplo:</p>

    <dl>
        <dt>HTML</dt>
        <dd>Linguagem de marcação para a criação de um site.</dd>
    </dl>
</body>
</html>
