<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áudio</title>
</head>
<body>
    <h1>Áudio no site</h1>
    <p>Existe dois modos de colocar o áudio</p>
    <p>Primeiro:</p>

    <audio src="audio/audio.mp3" controls></audio>

    <p>O segundo modo é maior pois traz uma segurança caso o audio não abra no primeiro formato, assim você colocar varios formatos para que ele possa carregar, exemplo: MP3, MWV e MP4, caso não abra o mp3 ele irá tentar abrir o proximos.</p>

    <audio preload="metadata" controls>
        <source src="audio/audio.mp3" type="audio/mpeg">
        <source src="audio/audio.ogg" type="audio/ogg">
        <source src="audio/audio.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="audio/audio.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>



</body>
</html>
